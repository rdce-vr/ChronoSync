<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1e1b4b" /> <!-- dark indigo -->
      <stop offset="100%" stop-color="#030712" /> <!-- black slate -->
    </radialGradient>
    
    <!-- Violet Neon Gradient -->
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" /> <!-- violet-400 -->
      <stop offset="50%" stop-color="#a855f7" /> <!-- violet-500 -->
      <stop offset="100%" stop-color="#7e22ce" /> <!-- violet-700 -->
    </linearGradient>

    <!-- Metallic Gold for the clock indicators -->
    <linearGradient id="goldGear" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d97706" /> <!-- amber-600 -->
      <stop offset="50%" stop-color="#f59e0b" /> <!-- amber-500 -->
      <stop offset="100%" stop-color="#fef08a" /> <!-- yellow-200 -->
    </linearGradient>

    <!-- Glassmorphic Overlay Gradient -->
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Rounded Rectangle Background (Perfect for iOS & Android launcher formats) -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- Outer glowing rings representing Chronos Time orbits -->
  <circle cx="256" cy="275" r="190" fill="none" stroke="url(#neonGlow)" stroke-width="3" stroke-opacity="0.15" />
  <circle cx="256" cy="275" r="170" fill="none" stroke="url(#neonGlow)" stroke-width="5" stroke-dasharray="14 16" stroke-opacity="0.75" />
  <circle cx="256" cy="275" r="140" fill="none" stroke="url(#neonGlow)" stroke-width="2" stroke-opacity="0.3" />

  <!-- Padlock Shackle on top of the dial center -->
  <path d="M196 230 V 170 C 196 137, 223 110, 256 110 C 289 110, 316 137, 316 170 V 230" 
        fill="none" stroke="url(#goldGear)" stroke-width="12" stroke-linecap="round" />

  <!-- Shield/Hexagonal Badge in the center representing Secure Encryption -->
  <path d="M176 210 C 176 210, 256 185, 256 185 C 256 185, 336 210, 336 210 C 336 295, 305 365, 256 410 C 207 365, 176 295, 176 210 Z" 
        fill="url(#neonGlow)" fill-opacity="0.08" stroke="url(#neonGlow)" stroke-width="8" filter="url(#glow)" />

  <!-- Embedded Clock Face inside the secure center -->
  <g transform="translate(256, 305)">
    <!-- Chronos Microticks -->
    <circle cx="0" cy="0" r="75" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-dasharray="1 13" stroke-opacity="0.4" />
    
    <!-- Central Secure Pivot Shield -->
    <circle cx="0" cy="0" r="22" fill="#030712" stroke="url(#goldGear)" stroke-width="4.5" />
    <circle cx="0" cy="0" r="8" fill="url(#goldGear)" />

    <!-- Clock Hands matching the dynamic nature of TOTP cycles -->
    <!-- Hour Hand pointing to 10 o'clock -->
    <line x1="0" y1="0" x2="-32" y2="-32" stroke="url(#goldGear)" stroke-width="7" stroke-linecap="round" />
    <!-- Minute Hand pointing to 2 o'clock -->
    <line x1="0" y1="0" x2="50" y2="-15" stroke="url(#goldGear)" stroke-width="5" stroke-linecap="round" />
    <!-- Red High-Precision Second Hand representing precise NTP dynamic timing -->
    <line x1="0" y1="0" x2="0" y2="60" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" />
    <circle cx="0" cy="62" r="3.5" fill="#ef4444" />
  </g>

  <!-- Elegant Glossy Glass reflection -->
  <path d="M 0 0 Q 256 100 512 0 L 512 512 Z" fill="url(#glass)" opacity="0.25" pointer-events="none" />
</svg>
